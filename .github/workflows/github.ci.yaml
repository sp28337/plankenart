name: CI Planken Art

on:
  push:
    branches:
      # - main
      - dev
  pull_request:
    branches:
      # - main
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          # Astro 6 requires >=22.12.0. Using LTS minor pin is enough —
          # no need to pin a specific patch like 24.11.1.
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache the .astro directory (content collection cache, build metadata).
      # Key includes content + assets hash so cache invalidates on real changes.
      - name: Cache Astro build
        uses: actions/cache@v5
        with:
          path: .astro
          key: astro-${{ runner.os }}-${{ hashFiles('src/content/**', 'src/assets/**', 'astro.config.mjs') }}
          restore-keys: |
            astro-${{ runner.os }}-

      # pnpm build runs "astro check && astro build".
      # astro check validates TypeScript — keep it for safety.
      # With images on CDN, Sharp no longer processes thousands of files,
      # so build time drops to ~30s even with check enabled.
      - name: Build Astro project
        run: pnpm build
        env:
          PUBLIC_ROBOTS_POLICY: ${{ github.ref == 'refs/heads/main' && 'allow' || 'disallow' }}

      # ─── DEV deployment ──────────────────────────────────────────────────

      - name: Upload dist to DEV server
        if: github.ref == 'refs/heads/dev'
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEV_HOST }}
          port: ${{ secrets.DEV_PORT }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "~/plankenart_build/"
          rm: true

      - name: Deploy on DEV server
        if: github.ref == 'refs/heads/dev'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEV_HOST }}
          port: ${{ secrets.DEV_PORT }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            DEPLOY_DIR="/var/sp28337/plankenart"
            BACKUP_DIR="/var/sp28337/backups"

            sudo mkdir -p "$BACKUP_DIR"

            # Backup current dist before overwriting
            if [ -d "$DEPLOY_DIR/dist" ]; then
              sudo cp -r "$DEPLOY_DIR/dist" "$BACKUP_DIR/dist_$TIMESTAMP"
            fi

            # Keep only the last 3 backups — prevent disk accumulation
            ls -dt "$BACKUP_DIR"/dist_* 2>/dev/null | tail -n +4 | xargs sudo rm -rf || true

            # rsync is safer than cp -r: atomic-ish, only transfers changed files
            sudo rsync -a --delete ~/plankenart_build/dist/ "$DEPLOY_DIR/dist/"
            sudo chmod -R 755 "$DEPLOY_DIR/dist"
            sudo chown -R sp28337:sp28337 "$DEPLOY_DIR/dist"

            sudo nginx -t
            sudo systemctl reload nginx

            rm -rf ~/plankenart_build
            echo "✅ DEV deployed at $TIMESTAMP"

      # ─── PROD deployment ─────────────────────────────────────────────────

      - name: Upload dist to PROD server
        if: github.ref == 'refs/heads/main'
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          port: ${{ secrets.PROD_PORT }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "~/plankenart_build/"
          rm: true

      - name: Deploy on PROD server
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          port: ${{ secrets.PROD_PORT }}
          username: ${{ secrets.PROD_USER }}
          # BUG FIX: was `secrets.SSH_PRIVATE_KEY` — inconsistent with SCP step above.
          # Must match the secret name used in the scp step.
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            DEPLOY_DIR="/var/www/plankenart"
            BACKUP_DIR="/var/www/backups/plankenart"

            sudo mkdir -p "$BACKUP_DIR"

            if [ -d "$DEPLOY_DIR/dist" ]; then
              sudo cp -r "$DEPLOY_DIR/dist" "$BACKUP_DIR/dist_$TIMESTAMP"
            fi

            ls -dt "$BACKUP_DIR"/dist_* 2>/dev/null | tail -n +4 | xargs sudo rm -rf || true

            # BUG FIX: was `/home/www/astro_build/dist/*` — wrong directory name.
            # scp-action uploads to ~/plankenart_build/, so source must match.
            sudo rsync -a --delete ~/plankenart_build/dist/ "$DEPLOY_DIR/dist/"
            sudo chmod -R 755 "$DEPLOY_DIR/dist"
            sudo chown -R www:www "$DEPLOY_DIR/dist"

            sudo nginx -t
            sudo systemctl reload nginx

            rm -rf ~/plankenart_build
            echo "✅ PROD deployed at $TIMESTAMP"

      - name: Notify deployment
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment completed successfully"
          else
            echo "❌ Deployment failed"
          fi
