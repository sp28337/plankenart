name: CI

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        # with:
        #   version: 11.13.0
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Astro check
        run: pnpm run check
      # - name: Dependency audit
      #   run: pnpm audit --audit-level high
      - name: Build
        run: pnpm build
        env:
          PUBLIC_ROBOTS_POLICY: ${{ github.ref == 'refs/heads/main' && 'allow' || 'disallow' }}
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: plankenart-${{ github.sha }}
          path: dist/*
          retention-days: 7
