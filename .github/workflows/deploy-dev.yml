name: Deploy Development

on:
  push:
    branches:
      - dev

permissions:
  contents: read

concurrency:
  group: development
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04

    environment:
      name: development

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        # with:
        #   version: 11.13.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          PUBLIC_ROBOTS_POLICY: disallow

      - name: Create release archive
        run: |
          tar -czf release.tar.gz dist package.json

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}

      - name: Configure known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEV_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Upload release
        run: |
          scp \
            -P ${{ secrets.DEV_PORT }} \
            release.tar.gz \
            ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }}:/tmp/release.tar.gz

      - name: Deploy
        run: |
          ssh \
            -p ${{ secrets.PROD_PORT }} \
            ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }} \
            "/var/www/plankenart/scripts/deploy.sh /tmp/release.tar.gz"
